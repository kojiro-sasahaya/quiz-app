<style>
:root {
--ink: #1a1a2e;
--paper: #faf7f0;
--accent: #c84b31;
--muted: #8a8070;
--card: #fff;
--border: #e0d8c8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
font-family: 'Noto Sans JP', sans-serif;
background: var(--paper);
color: var(--ink);
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 32px 16px;
background-image:
radial-gradient(circle at 20% 20%, rgba(200,75,49,0.05) 0%, transparent 50%),
radial-gradient(circle at 80% 80%, rgba(212,160,23,0.06) 0%, transparent 50%);
}
.logo-deco { font-family:'Kaisei Decol',serif; font-size:12px; letter-spacing:.3em; color:var(--muted); margin-bottom:6px; text-align:center; }
h1 { font-family:'Kaisei Decol',serif; font-size:clamp(28px,5vw,40px); font-weight:700; text-align:center; }
h1 span { color:var(--accent); }
.subtitle { font-size:13px; color:var(--muted); margin-top:6px; margin-bottom:28px; text-align:center; letter-spacing:.05em; }

.subject-columns { display:grid; grid-template-columns:repeat(auto-fit, minmax(260px,1fr)); gap:24px; width:100%; max-width:640px; }
.subject-col { display:flex; flex-direction:column; }
.subject-title { font-family:'Kaisei Decol',serif; font-size:35px; font-weight:700; text-align:center; margin-bottom:12px; }
.topic-list { display:flex; flex-direction:column; gap:8px; }
.topic-btn {
display:flex; align-items:center; gap:12px; background:var(--card); border:2px solid var(--border); border-radius:14px;
padding:12px 14px; text-decoration:none; color:var(--ink); transition:all .2s;
}
.topic-btn:hover { border-color:var(--accent); transform:translateY(-2px); box-shadow:0 6px 18px rgba(26,26,46,.06); }
.topic-icon { font-size:22px; flex-shrink:0; width:28px; text-align:center; }
.topic-name { font-size:25px; font-weight:700; flex:1; }
.topic-arrow { color:var(--muted); font-size:14px; }
.topic-btn.disabled { opacity:.5; border-style:dashed; pointer-events:none; }
.topic-btn.disabled .topic-name::after { content:'（準備中）'; font-size:11px; color:var(--muted); font-weight:500; margin-left:6px; }

.topic-progress { display:flex; align-items:center; gap:6px; margin-right:4px; }
.topic-progress .pct { font-size:18px; font-weight:700; color:var(--muted); min-width:30px; text-align:right; }
.dashboard-link {
margin-top: 28px; font-size:14px; color:var(--muted); text-decoration:none; border-bottom:1px dashed var(--border); padding-bottom:2px;
}
.dashboard-link:hover { color:var(--ink); border-color:var(--muted); }
</style>
</head>
<body>

<script src="shared/config.js"></script>
<script src="shared/api-client.js"></script>
<script>
const CATEGORY_TOPIC_SOCIETY = {
  '盆地':'地形','河川':'地形','海岸':'地形','平野':'地形','地形':'地形','歴史':'地形',
  '農業':'産業','水産業':'産業','交通':'産業',
  '気候':'気候','雪国のくらし':'気候'
};
const CATEGORY_TOPIC_SCIENCE = {
  '天気':'天気','こん虫':'生物','春の生物':'生物','光':'光','水のすがた':'水','太陽の動き':'天体','磁石':'磁石','地層':'地層'
};

function classify(s) {
  if (!s) return 'none';
  if ((s.streak_correct || 0) >= 2) return 'green';
  if ((s.correct || 0) >= 1) return 'orange';
  return 'none';
}

function ringSvg(greenFrac, orangeFrac) {
  const r = 10, C = 2 * Math.PI * r;
  const seg = (start, frac, color) => {
    if (frac <= 0) return '';
    const len = frac * C;
    return `<circle cx="14" cy="14" r="${r}" fill="none" stroke="${color}" stroke-width="4" stroke-dasharray="${len} ${C - len}" transform="rotate(${start * 360 - 90} 14 14)"/>`;
  };
  return `<svg class="ring" width="28" height="28" viewBox="0 0 28 28">
    <circle cx="14" cy="14" r="${r}" fill="none" stroke="#e0d8c8" stroke-width="4"/>
    ${seg(0, greenFrac, '#3f9142')}
    ${seg(greenFrac, orangeFrac, '#c84b31')}
  </svg>`;
}

function renderProgress(el, green, orange, total) {
  if (!total) { el.innerHTML = ''; return; }
  const greenFrac = green / total;
  const orangeFrac = orange / total;
  const pct = Math.round(((green + orange) / total) * 100);
  el.innerHTML = ringSvg(greenFrac, orangeFrac) + `<span class="pct">${pct}%</span>`;
}

async function loadQuestions(path) {
  const res = await fetch(path, { cache: 'no-store' });
  const code = await res.text();
  return new Function(code + '; return QUESTIONS;')();
}

function countTopics(questions, map) {
  const counts = {};
  questions.forEach(q => {
    const topic = map[q.category];
    if (!topic) return;
    counts[topic] = (counts[topic] || 0) + 1;
  });
  return counts;
}

function tallyByTopic(questions, map, statsByQ) {
  const tally = {};
  questions.forEach(q => {
    const topic = map[q.category];
    if (!topic) return;
    if (!tally[topic]) tally[topic] = { green: 0, orange: 0 };
    const cls = classify(statsByQ[String(q.id)]);
    if (cls === 'green') tally[topic].green++;
    else if (cls === 'orange') tally[topic].orange++;
  });
  return tally;
}

async function initProgress() {
  const spans = Array.from(document.querySelectorAll('.topic-progress'));
  if (spans.length === 0) return;
  try {
    const [societyQuestions, scienceQuestions] = await Promise.all([
      loadQuestions('units/society/data.js'),
      loadQuestions('units/science/data.js'),
    ]);
    const [societyStats, scienceStats, prefStats] = await Promise.all([
      QuizAPI.getStats('society').catch(() => ({ questions: [] })),
      QuizAPI.getStats('science').catch(() => ({ questions: [] })),
      QuizAPI.getStats('pref').catch(() => ({ questions: [] })),
    ]);

    const societyStatsByQ = {};
    (societyStats.questions || []).forEach(q => { societyStatsByQ[String(q.question_id)] = q; });
    const scienceStatsByQ = {};
    (scienceStats.questions || []).forEach(q => { scienceStatsByQ[String(q.question_id)] = q; });

    const societyTotals = countTopics(societyQuestions, CATEGORY_TOPIC_SOCIETY);
    const scienceTotals = countTopics(scienceQuestions, CATEGORY_TOPIC_SCIENCE);
    const societyTally = tallyByTopic(societyQuestions, CATEGORY_TOPIC_SOCIETY, societyStatsByQ);
    const scienceTally = tallyByTopic(scienceQuestions, CATEGORY_TOPIC_SCIENCE, scienceStatsByQ);

    const prefStatsByQ = {};
    (prefStats.questions || []).forEach(q => { prefStatsByQ[String(q.question_id)] = q; });
    let prefGreen = 0, prefOrange = 0;
    Object.values(prefStatsByQ).forEach(q => {
      const cls = classify(q);
      if (cls === 'green') prefGreen++;
      else if (cls === 'orange') prefOrange++;
    });

    spans.forEach(el => {
      const unit = el.dataset.unit;
      const topic = el.dataset.topic;
      if (unit === 'pref') {
        renderProgress(el, prefGreen, prefOrange, 47);
      } else if (unit === 'society') {
        const t = societyTally[topic] || { green: 0, orange: 0 };
        renderProgress(el, t.green, t.orange, societyTotals[topic] || 0);
      } else if (unit === 'science') {
        const t = scienceTally[topic] || { green: 0, orange: 0 };
        renderProgress(el, t.green, t.orange, scienceTotals[topic] || 0);
      }
    });
  } catch (e) {
    console.error('progress load failed', e);
  }
}

window.addEventListener('load', initProgress);
</script>
