<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>まなびクイズ</title>
<link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
--ink: #1a1a2e;
--paper: #faf7f0;
--accent: #c84b31;
--muted: #8a8070;
--card: #fff;
--border: #e0d8c8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
font-family: 'Noto Sans JP', sans-serif;
background: var(--paper);
color: var(--ink);
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 32px 16px;
background-image:
radial-gradient(circle at 20% 20%, rgba(200,75,49,0.05) 0%, transparent 50%),
radial-gradient(circle at 80% 80%, rgba(212,160,23,0.06) 0%, transparent 50%);
}
.logo-deco { font-family:'Kaisei Decol',serif; font-size:12px; letter-spacing:.3em; color:var(--muted); margin-bottom:6px; text-align:center; }
h1 { font-family:'Kaisei Decol',serif; font-size:clamp(28px,5vw,40px); font-weight:700; text-align:center; }
h1 span { color:var(--accent); }
.subtitle { font-size:13px; color:var(--muted); margin-top:6px; margin-bottom:28px; text-align:center; letter-spacing:.05em; }

.subject-columns { display:grid; grid-template-columns:repeat(auto-fit, minmax(260px,1fr)); gap:24px; width:100%; max-width:640px; }
.subject-col { display:flex; flex-direction:column; }
.subject-title { font-family:'Kaisei Decol',serif; font-size:16px; font-weight:700; text-align:center; margin-bottom:12px; }
.topic-list { display:flex; flex-direction:column; gap:8px; }
.topic-btn {
display:flex; align-items:center; gap:12px; background:var(--card); border:2px solid var(--border); border-radius:14px;
padding:12px 14px; text-decoration:none; color:var(--ink); transition:all .2s;
}
.topic-btn:hover { border-color:var(--accent); transform:translateY(-2px); box-shadow:0 6px 18px rgba(26,26,46,.06); }
.topic-icon { font-size:22px; flex-shrink:0; width:28px; text-align:center; }
.topic-name { font-size:14px; font-weight:700; flex:1; }
.topic-arrow { color:var(--muted); font-size:14px; }
.topic-btn.disabled { opacity:.5; border-style:dashed; pointer-events:none; }
.topic-btn.disabled .topic-name::after { content:'（準備中）'; font-size:11px; color:var(--muted); font-weight:500; margin-left:6px; }

.dashboard-link {
margin-top: 28px; font-size:14px; color:var(--muted); text-decoration:none; border-bottom:1px dashed var(--border); padding-bottom:2px;
}
.dashboard-link:hover { color:var(--ink); border-color:var(--muted); }
</style>
</head>
<body>

</html>
